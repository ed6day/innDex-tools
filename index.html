<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>innDex Tools</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .card {
      width: min(680px, 92vw);
      background: #fff;
      border: 1px solid #dbe3ee;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 10px; }
    p { margin: 0 0 18px; color: #6b7280; }
    a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 10px;
      background: #0f62fe;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>innDex Tools</h1>
    <p>Open the internal RAMS + Safe Start tools hub.</p>
    <a id="hubLink" href="/hub">Open Tools Hub</a>
  </main>
  <script>
    (function setHubLink() {
      const RENDER_URL = 'https://inndex-tools.onrender.com/hub';
      const link = document.getElementById('hubLink');
      if (!link) return;
      if (window.location.hostname.endsWith('github.io')) {
        link.setAttribute('href', RENDER_URL);
        setTimeout(() => {
          window.location.replace(RENDER_URL);
        }, 1200);
        return;
      }
      link.setAttribute('href', '/hub');
    })();
  </script>
</body>
</html>
